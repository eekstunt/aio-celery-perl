name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Perl ${{ matrix.perl-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        perl-version:
          - '5.26'
          - '5.28'
          - '5.30'
          - '5.32'
          - '5.34'
          - '5.36'
          - '5.38'
          - '5.40'
        include:
          - os: macos-latest
            perl-version: '5.38'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Perl ${{ matrix.perl-version }}
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}

      - name: Install dependencies
        run: |
          cpanm --notest --installdeps .
          cpanm --notest Test2::V0 Test::MockModule Test::MockObject

      - name: Build
        run: |
          perl Makefile.PL
          make

      - name: Run tests
        run: make test

      - name: Run tests (verbose)
        if: failure()
        run: prove -lv t/

  lint:
    name: Perl syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'

      - name: Install dependencies
        run: cpanm --notest --installdeps .

      - name: Check syntax of all modules
        run: |
          for f in $(find lib -name '*.pm'); do
            perl -Ilib -c "$f" || exit 1
          done

      - name: Check syntax of CLI
        run: perl -Ilib -c bin/aio-celery
