worker_processes 4;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
}

http {
    # Log with microsecond timestamps to prove concurrency
    log_format timed '$remote_addr - [$time_local] "$request" $status '
                     '$request_time $connection $connection_requests';

    access_log /var/log/nginx/access.log timed;

    server {
        listen 80;

        location / {
            # Simulate a tiny I/O delay (10ms) so requests overlap
            return 200 "ok\n";
        }

        location /delay {
            # Return after headers — minimal work
            return 200 "delayed ok\n";
        }
    }
}
