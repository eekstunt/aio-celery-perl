services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 10

  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      rabbitmq:
        condition: service_healthy

  # Sidecar to tail nginx logs in real time
  log-collector:
    image: alpine:latest
    volumes:
      - nginx-logs:/var/log/nginx
    command: tail -f /var/log/nginx/access.log
    depends_on:
      - nginx

volumes:
  nginx-logs:
